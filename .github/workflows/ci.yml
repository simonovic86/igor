name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel previous runs on the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      
      - name: Verify Go version
        run: go version
      
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest
      
      - name: Dependency validation
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      
      - name: Formatting check
        run: make fmt-check
      
      - name: Run go vet
        run: make vet
      
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
      
      - name: Run tests
        run: make test
      
      - name: Build igord binary
        run: make build
      
      - name: Verify binary exists
        run: |
          ls -lh bin/igord
          ./bin/igord --help || echo "Binary built successfully"
  
  build-agent:
    name: Build Example Agent (WASM)
    runs-on: ubuntu-latest
    # Optional - don't fail CI if TinyGo not easily available
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install TinyGo
        run: |
          wget https://github.com/tinygo-org/tinygo/releases/download/v0.40.1/tinygo_0.40.1_amd64.deb
          sudo dpkg -i tinygo_0.40.1_amd64.deb
      
      - name: Build example agent
        run: make agent
      
      - name: Verify WASM artifact
        run: ls -lh agents/example/agent.wasm
