# golangci-lint configuration for Igor v0
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  go: "1.25"

linters:
  enable:
    # Code correctness
    - govet          # Official Go vet
    - staticcheck    # Advanced static analysis
    - errcheck       # Unchecked errors
    - ineffassign    # Detect ineffectual assignments
    - unused         # Unused code detection
    
    # Code simplification
    - gosimple       # Simplify code
    
    # Code style and best practices
    - revive         # Fast, configurable, extensible linter
    - gofmt          # Formatting check
    - goimports      # Import formatting and organization
    
    # Additional quality checks
    - unconvert      # Remove unnecessary type conversions
    - unparam        # Unused function parameters
    - misspell       # Spelling mistakes
    - gocyclo        # Cyclomatic complexity
    - bodyclose      # HTTP response body close check

  disable:
    # Overly strict or stylistic linters
    - varnamelen     # Variable name length (too strict)
    - exhaustruct    # Exhaustive struct initialization (too strict)
    - nlreturn       # Newline before return (stylistic)
    - wsl            # Whitespace linter (too opinionated)
    - gofumpt        # Stricter gofmt (prefer standard gofmt)

linters-settings:
  gocyclo:
    # Maximum cyclomatic complexity
    # Slightly relaxed for event loop functions
    min-complexity: 20
  
  revive:
    # Minimal revive rules - avoid overly strict style enforcement
    rules:
      - name: exported
        severity: warning
      - name: error-return
      - name: error-strings
      - name: increment-decrement
      - name: var-declaration
      - name: range

  errcheck:
    # Check for errors in type assertions
    check-type-assertions: true
    # Check for errors in blank assignments
    check-blank: false

issues:
  # Maximum issues to report (0 = unlimited)
  max-issues-per-linter: 0
  max-same-issues: 0

  # Exclude WASM agent code — compiled with TinyGo, not native Go.
  # The //go:wasmimport directives produce bodyless functions that
  # the native type checker cannot handle.
  exclude-dirs:
    - agents
  
  # Exclude common false positives
  exclude-rules:
    # Exclude linter errors in generated code
    - path: _test\.go
      linters:
        - errcheck
    
    # Allow unused parameters in interface implementations
    - linters:
        - unused
        - unparam
      text: "is unused"
      path: _test\.go

  # Show all issues (don't suppress duplicates)
  new: false

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
